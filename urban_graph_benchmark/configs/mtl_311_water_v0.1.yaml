notes:
  - Dataset v0 builds successfully with validation status pass.
  - Dataset v0 uses a derived municipal Montréal 311 grid25m-month table as the direct benchmark input.
  - The upstream raw/provenance source remains transformation/requetes311.csv.
  - 311 requests are treated as reported municipal disruption signals, not objective physical flood incidents.
  - Spatial assignment uses coordinate-row centroid-in-polygon, not unit_id-level first-coordinate assignment.
  - Assignment uses lon_centroid/lat_centroid in EPSG:4326 reprojected to EPSG:3347.
  - x_centroid/y_centroid are kept for audit but are not trusted as EPSG:3347 in v0.
  - The final panel preserves source totals up to negligible losses from unassigned coordinate rows.
  - SVI is allowed in Montréal tract-level Track A; SoVI is not a valid within-Montréal tract-level baseline.
  - Population-weighted centroids, OSM routing, accessibility features, and environmental layers are planned for later modules.