name: svi_like
version: "0.1"
source: CDC/ATSDR SVI-inspired implementation
source_reference:
  citation: Flanagan et al. 2011, A Social Vulnerability Index for Disaster Management
  doi: 10.2202/1547-7355.1792
method_reference: CDC/ATSDR SVI rank-based domain methodology
construct_measured: social_vulnerability
score_direction: higher_is_more_vulnerable
reproduction_level: local_adaptation
spatial_id_column: zone_id
population_column: population

comparison:
  scopes:
    - name: global
      group_column: null
  default_scope: global
  grouped_scope_status: designed_not_default

zero_population:
  action: exclude
  threshold: 0
  status: paper_explicit
  reason: Original SVI excludes census tracts with zero population before ranking.

ranking:
  method: percentile_rank
  formula: "(rank - 1) / (N - 1)"
  tie_method: min
  n_equals_one: zero
  higher_percentile_means: higher_vulnerability
  status: paper_explicit

flags:
  variable_flag_threshold: 0.90
  status: paper_explicit

domains:
  socioeconomic:
    label: Socioeconomic status
    variables:
      - pct_below_poverty
      - pct_unemployed
      - per_capita_income
      - pct_no_high_school

  household_disability:
    label: Household composition / disability
    variables:
      - pct_age_65_plus
      - pct_age_17_or_younger
      - pct_disability
      - pct_single_parent_households

  minority_language:
    label: Minority status / language
    variables:
      - pct_minority
      - pct_limited_language

  housing_transportation:
    label: Housing / transportation
    variables:
      - pct_multiunit_structures
      - pct_mobile_homes
      - pct_crowding
      - pct_no_vehicle
      - pct_group_quarters

variables:
  pct_below_poverty:
    canonical_name: pct_below_poverty
    required: true
    domain: socioeconomic
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent individuals below poverty
    status: paper_explicit

  pct_unemployed:
    canonical_name: pct_unemployed
    required: true
    domain: socioeconomic
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent civilian unemployed
    status: paper_explicit

  per_capita_income:
    canonical_name: per_capita_income
    required: true
    domain: socioeconomic
    direction: negative
    unit: currency
    scale: currency
    numeric: true
    nonnegative: true
    original_variable: per_capita_income
    allowed_proxies:
      - median_household_income
    status: paper_explicit

  pct_no_high_school:
    canonical_name: pct_no_high_school
    required: true
    domain: socioeconomic
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons with no high school diploma
    status: paper_explicit

  pct_age_65_plus:
    canonical_name: pct_age_65_plus
    required: true
    domain: household_disability
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons 65 years and older
    status: paper_explicit

  pct_age_17_or_younger:
    canonical_name: pct_age_17_or_younger
    required: true
    domain: household_disability
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons 17 years and younger
    status: paper_explicit

  pct_disability:
    canonical_name: pct_disability
    required: true
    domain: household_disability
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons age 5+ with a disability
    status: paper_explicit

  pct_single_parent_households:
    canonical_name: pct_single_parent_households
    required: true
    domain: household_disability
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent single-parent households with children under 18
    status: paper_explicit

  pct_minority:
    canonical_name: pct_minority
    required: true
    domain: minority_language
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent minority
    status: local_adaptation
    conceptual_risk: Minority-status concepts require careful Canadian and Québec-specific interpretation.

  pct_limited_language:
    canonical_name: pct_limited_language
    required: true
    domain: minority_language
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons age 5+ who speak English less than well
    status: local_adaptation
    conceptual_risk: Montréal/Québec adaptation may require a documented limited French/English or language-isolation proxy.

  pct_multiunit_structures:
    canonical_name: pct_multiunit_structures
    required: true
    domain: housing_transportation
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent multi-unit structures
    status: paper_explicit

  pct_mobile_homes:
    canonical_name: pct_mobile_homes
    required: true
    domain: housing_transportation
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent mobile homes
    status: local_adaptation
    conceptual_risk: Mobile homes may be unavailable or low relevance in Montréal/Québec and should be validated locally.

  pct_crowding:
    canonical_name: pct_crowding
    required: true
    domain: housing_transportation
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: occupied housing units with more than one person per room
    status: paper_explicit

  pct_no_vehicle:
    canonical_name: pct_no_vehicle
    required: true
    domain: housing_transportation
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: households with no vehicle available
    status: paper_explicit

  pct_group_quarters:
    canonical_name: pct_group_quarters
    required: true
    domain: housing_transportation
    direction: positive
    unit: proportion
    scale: proportion_0_1
    numeric: true
    nonnegative: true
    original_variable: percent persons in group quarters
    status: paper_explicit

missing_data:
  strategy: error
  add_missing_flags: true
  status: implementation_assumption
  reason: Original SVI does not specify imputation after excluding zero-population units.

aggregation:
  method: svi_domain_sum_then_domain_percentile_then_overall_percentile
  status: paper_explicit

classification:
  method: quantile
  n_classes: 5

outputs:
  include_intermediate_columns: true
  include_metadata: true
  include_variable_flags: true
  include_domain_scores: true

assumptions:
  - status: method_family_default
    description: Percentile ranks use min tie handling and the formula (rank - 1) / (N - 1).
  - status: paper_explicit
    description: SVI is an area-level social vulnerability index, not an individual-level classification.
  - status: implementation_assumption
    description: N=1 comparison scopes receive percentile 0.0 and this behavior is reported in metadata.

decisions:
  - status: local_adaptation
    description: This recipe preserves the SVI methodology while allowing Canadian municipal feature tables and documented proxies.
