missing_data:
  strategy: zero_imputation
  add_missing_flags: true
  status: paper_explicit_original_method
  warning: Zero imputation can distort factor structure when zero is not substantively meaningful.

standardization:
  method: zscore
  center: true
  scale: true
  ddof: 0
  zero_variance_behavior: drop
  status: statistically_required_for_pca

factor_analysis:
  method: pca
  input_matrix: standardized_variables

factor_retention:
  method: eigenvalue_gt
  threshold: 1.0

rotation:
  method: varimax
  normalize: true
  max_iter: 500
  tol: 1.0e-6

factor_scores:
  method: rotated_projection
  save_unrotated_scores: true
  save_rotated_scores: true

factor_orientation:
  mode: manual_config
  default_unconfigured_behavior: warn
  note: Factor signs are arbitrary; these are placeholders requiring researcher validation for a real dataset.
  factors:
    factor_1: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_2: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_3: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_4: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_5: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_6: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_7: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_8: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_9: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_10: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_11: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}
    factor_12: {method: positive, rationale: "Placeholder orientation; researcher must inspect rotated loadings."}

aggregation:
  method: additive_factor_sum
  weights: equal

classification:
  method: standard_deviation_bands

outputs:
  include_standardized_variables: true
  include_loadings: true
  include_rotated_loadings: true
  include_factor_scores: true
  include_oriented_factor_scores: true
  include_metadata: true
  include_validation_report: true

assumptions:
  - status: implementation_assumption
    description: PCA is run on z-scored variables, equivalent to using a correlation-style input matrix.
  - status: paper_explicit_original_method
    description: Missing values are zero-imputed in the original SoVI workflow.
  - status: researcher_decision_required
    description: Factor names and factor orientations require human interpretation of rotated loadings.
  - status: local_adaptation
    description: This recipe represents the 42-variable target structure but uses local canonical column names.
