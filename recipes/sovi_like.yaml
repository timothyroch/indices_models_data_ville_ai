name: sovi_like
version: "0.1"
source: Cutter, Boruff & Shirley SoVI-inspired implementation
source_reference:
  citation: Cutter, Boruff & Shirley 2003, Social Vulnerability to Environmental Hazards
  journal: Social Science Quarterly
method_reference: SoVI PCA/factor-analysis methodology with varimax rotation
construct_measured: social_vulnerability
score_direction: higher_is_more_vulnerable
reproduction_level: local_adaptation
spatial_id_column: zone_id

original_reference_variables:
  - MED_AGE90
  - PERCAP89
  - MVALOO90
  - MEDRENT90
  - PHYSICN90
  - PCTVOTE92
  - BRATE90
  - MIGRA_97
  - PCTFARMS92
  - PCTBLACK90
  - PCTINDIAN90
  - PCTASIAN90
  - PCTHISPANIC90
  - PCTKIDS90
  - PCTOLD90
