missing_data:
  strategy: zero_imputation
  add_missing_flags: true
  status: paper_explicit_original_method
  warning: Zero imputation can distort factor structure when zero is not substantively meaningful. In this 38-variable Québec CD run, it mainly affects documented partial-coverage variables.

standardization:
  method: zscore
  center: true
  scale: true
  ddof: 0
  zero_variance_behavior: drop
  status: statistically_required_for_pca

factor_analysis:
  method: pca
  input_matrix: standardized_variables

factor_retention:
  method: eigenvalue_gt
  threshold: 1.0

rotation:
  method: varimax
  normalize: true
  max_iter: 500
  tol: 1.0e-6

factor_scores:
  method: rotated_projection
  save_unrotated_scores: true
  save_rotated_scores: true

factor_orientation:
  mode: manual_config
  default_unconfigured_behavior: error
  factors:
    factor_1:
      method: negative
      rationale: "Personal wealth / socioeconomic advantage factor. High income, high labour-force participation, and high-income households load positively, while poverty and government-transfer recipients load negatively. Reversed so poverty/resource disadvantage contributes positively to vulnerability."

    factor_2:
      method: negative
      rationale: "Density of built environment / economic activity factor. Housing, earnings, commercial, property, and manufacturing densities load strongly together with negative signs. Reversed so higher built-environment/economic density contributes positively to vulnerability, consistent with the original SoVI density factor."

    factor_3:
      method: negative
      rationale: "Social marginalization / Indigenous identity / education / female-headed-household factor. Indigenous identity, female-headed households, and no-high-school load negatively. Reversed so higher values of these vulnerability-relevant indicators increase vulnerability."

    factor_4:
      method: absolute
      rationale: "Ambiguous demographic/institutional/rural-economic contrast factor. Population change loads negatively, while physicians, hospitals, extractive employment, and voting proxy load positively. Following original SoVI treatment of ambiguous factors, use absolute value."

    factor_5:
      method: positive
      rationale: "Tenancy/service/female-share factor. Female share, service employment, renter share, and female-headed households load positively. Kept positive so higher values increase vulnerability."

    factor_6:
      method: absolute
      rationale: "Ambiguous agriculture/unemployment/service-access factor. Land in farms loads negatively, while unemployment, physicians, hospitals, and median age load positively. Following original SoVI treatment of ambiguous factors, use absolute value."

    factor_7:
      method: absolute
      rationale: "Weak/ambiguous infrastructure-tenancy contrast factor. Transportation/utility employment and voting proxy load negatively while renter share loads positively. Following original SoVI treatment of ambiguous factors, use absolute value."

aggregation:
  method: additive_factor_sum
  weights: equal

classification:
  method: standard_deviation_bands

outputs:
  include_standardized_variables: true
  include_loadings: true
  include_rotated_loadings: true
  include_factor_scores: true
  include_oriented_factor_scores: true
  include_metadata: true
  include_validation_report: true

assumptions:
  - status: implementation_assumption
    description: PCA is run on z-scored variables, equivalent to using a correlation-style input matrix.
  - status: paper_explicit_original_method
    description: Missing values are zero-imputed in the original SoVI workflow.
  - status: researcher_decision_required
    description: Factor names and factor orientations require human interpretation of rotated loadings.
  - status: local_adaptation
    description: This recipe represents a 38-variable Québec census-division SoVI-like adaptation using the available mapped variables.
  - status: unresolved_variables_documented
    description: PCTRFRM90, DEBREV92, HUPTDEN90, and PCTURB90 are intentionally omitted from the active variable block because no completed defensible full-coverage source mapping is available.