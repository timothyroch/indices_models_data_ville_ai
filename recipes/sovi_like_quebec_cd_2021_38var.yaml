unresolved_original_reference_variables:
  pct_rural_farm:
    original_variable: PCTRFRM90
    reason: No completed defensible full-coverage rural farm population source.
  debt_revenue_ratio:
    original_variable: DEBREV92
    reason: No completed municipal debt-to-revenue source aggregated to census divisions.
  housing_permit_density:
    original_variable: HUPTDEN90
    reason: Public StatCan building-permit table inspected but lacked CD/CSD geography.
  pct_urban:
    original_variable: PCTURB90
    reason: Census Profile inspection did not find a direct urban/rural population-share row.

