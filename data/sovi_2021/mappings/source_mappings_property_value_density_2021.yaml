# Source mapping for SoVI property-value-density variable.
#
# Scope:
#   - Québec census divisions
#   - 2021 SoVI-like input table
#
# Source block:
#   census_division_property_value_density_2021/
#
# Clean output:
#   census_division_property_value_density_2021/output/
#   clean_census_division_property_value_density_2021.csv
#
# Variable:
#   RPROPDEN92 -> property_value_density
#
# Method:
#   Uses a documented weak residential owner-occupied dwelling-value-density
#   proxy. The numerator is reconstructed as:
#
#     Census Profile ID 1415 Owner household count
#     *
#     Census Profile ID 1488 Median value of dwellings ($)
#
#   The result is divided by census-division land_area_km2.
#
# Important limitation:
#   This is not a total property-assessment value. It excludes rental,
#   commercial, industrial, institutional, farm, and land-assessment values.

property_value_density:
  source_folder: census_division_property_value_density_2021
  file_candidates:
    - output/clean_census_division_property_value_density_2021.csv
  column_candidates:
    - property_value_density
  status_class: ready_full_coverage_expected
  proxy_quality: weak_residential_owner_occupied_property_value_density_proxy
  allow_partial_coverage: false
  note: "Maps RPROPDEN92 to a weak residential owner-occupied dwelling-value-density proxy. The numerator is reconstructed as Census Profile characteristic ID 1415, Owner household count, multiplied by median_owner_occupied_housing_value from the cleaned housing tenure/costs output, corresponding to Census Profile characteristic ID 1488, Median value of dwellings ($). The result is divided by land_area_km2. Coverage is 98/98 Québec census divisions. This is not a true total assessed-property-value variable and excludes rental, commercial, industrial, institutional, farm, and land-assessment values."