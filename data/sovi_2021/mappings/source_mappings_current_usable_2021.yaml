    - pct_vote_leading_party_federal_2021
    - pct_vote_leading_party_federal_2021_area_weighted
  status_class: ready_full_coverage_expected_with_method_note
  proxy_quality: area_weighted_federal_election_proxy
  allow_partial_coverage: false
  note: "Maps PCTVOTE92 to a Canadian federal-election proxy. The source variable is the area-weighted 2021 federal electoral district leading-party/candidate vote-share proxy allocated to 2021 Québec census divisions. This is not a direct presidential-vote reproduction."

nursing_home_residents_per_capita:
