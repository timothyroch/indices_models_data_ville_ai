# Source mappings for currently usable census-division SoVI variables.
#
# This file externalizes the usable mappings that were previously hardcoded
# inside sovi_2021/inspect_census_division_sovi_input_sources_2021.py.
#
# Scope:
#   - Québec census divisions
#   - 2021 SoVI-like input table
#   - Variables already supported by completed transformation blocks
#
# Not included here:
#   - Variables still unmapped
#   - Variables intentionally unresolved
#   - pct_female_headed_households, because the current household/family cleaner
#     explicitly marks it unresolved.
#
# Partial inclusion:
#   - physicians_per_100k is included because it is usable with documented partial
#     coverage: 97/98 census divisions, with Nord-du-Québec unresolved.

med_age:
  source_folder: census_division_age_structure_2021
  file_candidates:
    - output/clean_census_division_age_structure_2021.csv
  column_candidates:
    - median_age
  status_class: ready_full_coverage_expected
  proxy_quality: direct_or_strong_proxy
  allow_partial_coverage: false
  note: "Maps MED_AGE90 to median_age from the census-division age-structure cleaner."

