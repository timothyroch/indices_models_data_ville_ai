physicians_per_100k:
  source_folder: doctors_per_100khabs
  file_candidates:
    - output/clean_census_division_doctors_per_100k_proxy_2024.csv
    - output/clean_census_division_doctors_per_100k_proxy_2024.parquet
  column_candidates:
    - physicians_per_100k
    - physicians_per_100k_health_region_proxy
    - physicians_per_100k_health_region
  status_class: ready_partial_with_documented_missing
  proxy_quality: health_region_proxy_one_documented_missing
  allow_partial_coverage: true
  minimum_non_missing_rows: 97
  expected_missing_note: "Nord-du-Québec is intentionally unresolved because the census division is too coarse relative to CIHI's northern health-region split."
  note: "Maps PHYSICN90 to a CIHI health-region physicians-per-100k proxy assigned to census divisions. This is health-region-native and has one documented missing CD: Nord-du-Québec."

pct_vote_leading_party:
  source_folder: census_division_voter_turnout_2021
  file_candidates:
